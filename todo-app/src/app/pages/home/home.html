<div class="mx-auto max-w-4xl px-4 py-6">
  <!-- Search -->
  <div class="mb-4">
    <input
      type="text"
      placeholder="Search by title..."
      class="w-full max-w-sm rounded border border-gray-300 px-3 py-2 text-sm"
      [value]="searchTerm()"
      (input)="searchTerm.set($any($event.target).value)"
    />
  </div>

  <!-- Add todo -->
  <form class="mb-6 flex gap-2" (submit)="addTodo($event)">
    <input
      #todoInput
      type="text"
      placeholder="Add a todo..."
      class="flex-1 max-w-xs rounded border border-gray-300 px-3 py-2 text-sm"
    />
    <button
      type="submit"
      class="rounded border border-gray-300 bg-gray-100 px-3 py-2 text-sm hover:bg-gray-200"
    >
      Add
    </button>
  </form>

  <!-- Loading skeletons -->
  @if (loading()) {
    <div class="grid grid-cols-2 gap-4">
      @for (s of [1,2,3,4]; track s) {
        <div class="rounded border border-gray-200 bg-gray-50 p-4">
          <div class="mb-2 h-4 w-3/4 animate-pulse rounded bg-gray-200"></div>
          <div class="h-4 w-1/2 animate-pulse rounded bg-gray-200"></div>
        </div>
      }
    </div>
  } @else if (error()) {
    <p class="rounded border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
      {{ error() }}
    </p>
  } @else {
    <div class="grid grid-cols-2 gap-4">
      @for (todo of todos() | filterTodo: searchTerm(); track todo.id) {
        <div
          class="rounded border px-4 py-3"
          [class.border-gray-200]="!todo.completed"
          [class.bg-gray-50]="!todo.completed"
          [class.border-green-200]="todo.completed"
          [class.bg-green-50]="todo.completed"
        >
          @if (editingId() === todo.id) {
            <div class="flex flex-col gap-2">
              <input
                type="text"
                class="rounded border border-gray-300 px-2 py-1 text-sm"
                [value]="editValue()"
                (input)="editValue.set($any($event.target).value)"
                (keyup.enter)="updateTodo(todo.id, editValue())"
              />
              <div class="flex gap-2">
                <button
                  type="button"
                  class="rounded bg-gray-200 px-2 py-1 text-xs hover:bg-gray-300"
                  (click)="updateTodo(todo.id, editValue())"
                >
                  Save
                </button>
                <button
                  type="button"
                  class="rounded bg-gray-200 px-2 py-1 text-xs hover:bg-gray-300"
                  (click)="cancelEdit()"
                >
                  Cancel
                </button>
              </div>
            </div>
          } @else {
            <div class="flex items-start justify-between gap-2">
              <label class="flex min-w-0 flex-1 cursor-pointer items-center gap-2">
                <input
                  type="checkbox"
                  [checked]="todo.completed"
                  (change)="toggleTodo(todo)"
                  class="mt-0.5 shrink-0"
                />
                <span
                  class="text-sm"
                  [class.line-through]="todo.completed"
                  [class.text-gray-500]="todo.completed"
                >
                  {{ todo.title }}
                </span>
              </label>
              <div class="flex shrink-0 gap-1">
                <button
                  type="button"
                  class="rounded px-2 py-1 text-xs text-gray-600 hover:bg-gray-200"
                  (click)="startEdit(todo)"
                >
                  Edit
                </button>
                <button
                  type="button"
                  class="rounded px-2 py-1 text-xs text-red-600 hover:bg-red-100"
                  (click)="deleteTodo(todo.id)"
                >
                  Delete
                </button>
              </div>
            </div>
          }
        </div>
      }
    </div>
  }
</div>
